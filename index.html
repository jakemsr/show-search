<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <script src="index.js" defer></script>
  <script src="https://kit.fontawesome.com/6735c82c6d.js" crossorigin="anonymous"></script>
  <title>Show Search</title>
</head>

<body>
  <div class="container">
    <header>
      <div class="nav">
        <div class="nav__logo">
          Show Finder
        </div>
        <div class="nav__links">
          <a href="mailto:jakemsr@yahoo.com" target="_blank" class="nav__link">Contact</a>
        </div>
      </div>
    </header>
    <section id="landing-page">
      <div class="title">
        <h2>Search for Movies</h2>
      </div>
      <div class="sub-title">
        <h3>This page searches for movies by title.</h3>
      </div>
      <div class="search-bar">
        <form id="search_shows" onsubmit="searchShows(event)">
          <input type="text" id="searchText" placeholder="Search by Title">
          <select id="filter" onchange="filterShows(event)">
            <option value="" disabled selected>Sort Order</option>
            <option value="TITLE_A_TO_Z">Title, A-Z</option>
            <option value="TITLE_Z_TO_A">Title, Z-A</option>
            <option value="YEAR_LOW_TO_HIGH">Year, Low to High</option>
            <option value="YEAR_HIGH_TO_LOW">Year, High to Low</option>
          </select>
          <input type="submit" class="btn" value="Search">
        </form>
      </div>
      <div class="shows">

      </div>
    </section>
    <footer>
      <div class="copyright">
        &copy; 2026 Jacob Meuser
      </div>
      <div class="ack">
        This pages uses the <a href="https://omdbapi.com/" target="_blank">OMDb API</a>.
      </div>
    </footer>
  </div>
</body>

</html>
